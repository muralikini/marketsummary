<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPulse • India Indices & Gold</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161625;
      --text: #e0e0e0;
      --primary: #00d4ff;
      --accent: #ff00aa;
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e2937;
      --primary: #0066cc;
    }

    body { font-family: system-ui, sans-serif; margin:0; background: var(--bg); color: var(--text); }
    .container { max-width: 1480px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 2rem; border-radius: 20px; text-align: center; position: relative; }
    .theme-toggle { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .card { background: var(--card); border-radius: 20px; padding: 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { margin: 0; font-size: 2.8rem; background: linear-gradient(90deg, #00d4ff, #ff00aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab { padding: 12px 28px; border-radius: 50px; cursor: pointer; background: #1f1f2e; }
    .tab.active { background: var(--primary); color: black; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1e2937; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></button>
      <h1>MarketPulse India</h1>
      <p>Real-time Indices • ETFs • Gold Tracking</p>
    </header>

    <div class="grid" style="margin-bottom: 2rem;">
      <div class="card"><h3>NIFTY 50</h3><h2 id="nifty50">23,366</h2><small>+0.45% Today</small></div>
      <div class="card"><h3>NIFTY Midcap 100</h3><h2 id="midcap">57,200</h2></div>
      <div class="card"><h3>GOLDBEES</h3><h2 id="goldbees">127.80</h2></div>
      <div class="card"><h3>Gold:Silver Ratio</h3><h2 id="gsratio">92.4</h2></div>
    </div>

    <!-- Year-wise Performance -->
    <div class="card">
      <h3>📊 Long-Term Year-wise Performance</h3>
      <div id="yearTable"></div>
    </div>

    <!-- Daily Performance -->
    <div class="card">
      <h3>📈 Recent Daily Performance (Last 5 Years Trend)</h3>
      <canvas id="dailyChart" height="120"></canvas>
    </div>
  </div>

  <script>
    // Sample Data (Replace with real data later)
    const indices = {
      nifty50: { current: 23366, change: 0.45 },
      midcap: { current: 57200, change: 1.2 },
      goldbees: { current: 127.8, change: -0.6 }
    };

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-btn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    // Render Year-wise Table
    function renderYearTable() {
      const html = `
        <table>
          <thead>
            <tr><th>Year</th><th>NIFTY 50</th><th>Midcap 100</th><th>Smallcap 250</th><th>GOLDBEES</th></tr>
          </thead>
          <tbody>
            <tr><td>2025</td><td>+12.4%</td><td>+28.7%</td><td>+35.2%</td><td>+18.9%</td></tr>
            <tr><td>2024</td><td>+15.8%</td><td>+24.1%</td><td>+29.8%</td><td>+22.3%</td></tr>
            <!-- Add more years as needed -->
          </tbody>
        </table>`;
      document.getElementById('yearTable').innerHTML = html;
    }

    window.onload = () => {
      renderYearTable();
      // Chart for daily trend
      new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: { labels: ['2021','2022','2023','2024','2025','2026'], datasets: [{ label: 'NIFTY 50', data: [12000,14000,18000,22000,24000,23366], borderColor: '#00d4ff' }] },
        options: { responsive: true }
      });
    };
  </script>
</body>
</html>
