<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPulse • India</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161625;
      --text: #e0e0e0;
      --primary: #00d4ff;
      --accent: #ff00aa;
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e2937;
      --primary: #0066cc;
    }

    body { font-family: system-ui, sans-serif; margin:0; background: var(--bg); color: var(--text); }
    .container { max-width: 1480px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 2rem; border-radius: 20px; text-align: center; position: relative; }
    .theme-toggle { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: var(--card); border-radius: 20px; padding: 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-height: 140px; }
    h1 { margin:0; font-size: 2.8rem; background: linear-gradient(90deg, #00d4ff, #ff00aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></button>
      <h1>MarketPulse India</h1>
      <p id="last-updated">Fetching live data from Alpha Vantage...</p>
    </header>

    <div class="grid" id="live-grid"></div>

    <div class="card">
      <h3>📊 Year-wise Performance Summary</h3>
      <div id="year-table" style="overflow-x:auto;"></div>
    </div>
  </div>

  <script>
    const API_KEY = "LJVKMQLYR18SFN9Q";

    const symbols = [
      { name: "NIFTY 50", symbol: "NIFTY" },
      { name: "GOLDBEES", symbol: "GOLDBEES" },
      // Add more as needed
    ];

    async function fetchAlphaVantage(symbol) {
      try {
        const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}&outputsize=compact`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (data["Time Series (Daily)"]) {
          const latestDate = Object.keys(data["Time Series (Daily)"])[0];
          const latest = data["Time Series (Daily)"][latestDate];
          return {
            price: parseFloat(latest["4. close"]).toFixed(2),
            change: "N/A" // Alpha Vantage daily doesn't give direct change easily
          };
        }
        return null;
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    async function updateLiveData() {
      const grid = document.getElementById('live-grid');
      grid.innerHTML = '';

      for (let item of symbols) {
        const data = await fetchAlphaVantage(item.symbol);
        
        if (data) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${item.name}</h3>
            <h2>₹${data.price}</h2>
            <span class="positive">Live</span>
          `;
          grid.appendChild(card);
        }
      }

      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString('en-IN')}`;
    }

    function renderYearTable() {
      const years = [
        {year: "2025", n50: "+12.4%", gold: "+19.8%"},
        {year: "2024", n50: "+15.2%", gold: "+22.4%"},
        {year: "2023", n50: "+18.9%", gold: "+14.7%"},
        {year: "2022", n50: "-8.4%",  gold: "+8.9%"},
        {year: "2021", n50: "+24.1%", gold: "-3.2%"}
      ];

      let html = `<table><thead><tr><th>Year</th><th>NIFTY 50</th><th>GOLDBEES</th></tr></thead><tbody>`;
      years.forEach(row => {
        html += `<tr><td><strong>${row.year}</strong></td><td>${row.n50}</td><td>${row.gold}</td></tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('year-table').innerHTML = html;
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-btn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    // Initialize
    window.onload = () => {
      renderYearTable();
      updateLiveData();
      setInterval(updateLiveData, 300000); // Refresh every 5 minutes
    };
  </script>
</body>
</html>
