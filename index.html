<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breeze • ICICI Direct</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161625;
      --text: #e0e0e0;
      --primary: #00d4ff;
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e2937;
      --primary: #0066cc;
    }

    body { 
      font-family: system-ui, sans-serif; 
      margin:0; 
      background: var(--bg); 
      color: var(--text); 
      transition: background 0.4s, color 0.4s;
    }
    .container { max-width: 1480px; margin: 0 auto; padding: 20px; }
    header { 
      background: linear-gradient(135deg, #1e3a8a, #3b82f6); 
      padding: 2rem; border-radius: 20px; 
      text-align: center; position: relative; 
    }
    .theme-toggle { 
      position: absolute; top: 20px; right: 20px; 
      background: rgba(255,255,255,0.25); border: none; 
      width: 52px; height: 52px; border-radius: 50%; 
      cursor: pointer; font-size: 1.5rem; color: white;
    }

    .card { 
      background: var(--card); 
      border-radius: 20px; 
      padding: 1.8rem; 
      margin-bottom: 1.5rem; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
    th { background: #1e2937; }
    [data-theme="light"] th { background: #e0f2fe; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></button>
      <h1>Breeze • ICICI Direct</h1>
      <p>Live Market Dashboard</p>
    </header>

    <!-- Config -->
    <div class="card">
      <h3>🔑 Breeze API Configuration</h3>
      <input type="text" id="apiKey" placeholder="API Key" style="width:100%;padding:12px;margin:8px 0;background:#0f0f1e;border:1px solid #444;border-radius:8px;" value="59E06m90zx8750d33n1g9U9311786E01">
      <input type="text" id="secretKey" placeholder="Secret Key" style="width:100%;padding:12px;margin:8px 0;background:#0f0f1e;border:1px solid #444;border-radius:8px;" value="2km$2C35*%218g7869^wRP28854890Y6">
      <input type="text" id="sessionToken" placeholder="Paste Session Token Here" style="width:100%;padding:12px;margin:8px 0;background:#0f0f1e;border:1px solid #444;border-radius:8px;">
      <button onclick="saveConfig()" style="margin-top:12px;padding:12px 24px;">Save & Connect</button>
    </div>

    <div class="grid" id="live-grid"></div>

    <div class="card">
      <h3>📊 Historical Yearly Returns</h3>
      <div id="yearly-returns" style="overflow-x:auto;"></div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      document.getElementById('theme-btn').innerHTML = newTheme === 'dark' ? 
        '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    function saveConfig() {
      const config = {
        apiKey: document.getElementById('apiKey').value.trim(),
        secretKey: document.getElementById('secretKey').value.trim(),
        sessionToken: document.getElementById('sessionToken').value.trim()
      };
      localStorage.setItem('breezeConfig', JSON.stringify(config));
      alert("✅ Configuration Saved!");
      renderDashboard();
    }

    function renderDashboard() {
      // Live Cards (Demo + Placeholder)
      document.getElementById('live-grid').innerHTML = `
        <div class="card"><h3>NIFTY 50</h3><h2>23,478</h2><span class="positive">+0.92%</span></div>
        <div class="card"><h3>NIFTY Midcap 100</h3><h2>57,845</h2><span class="positive">+1.68%</span></div>
        <div class="card"><h3>GOLDBEES</h3><h2>129.35</h2><span class="positive">+1.45%</span></div>
      `;

      // Yearly Returns
      document.getElementById('yearly-returns').innerHTML = `
        <table>
          <thead><tr><th>Year</th><th>NIFTY 50</th><th>Midcap 100</th><th>GOLDBEES</th></tr></thead>
          <tbody>
            <tr><td><strong>2025</strong></td><td class="positive">+12.8%</td><td class="positive">+24.6%</td><td class="positive">+19.8%</td></tr>
            <tr><td><strong>2024</strong></td><td class="positive">+15.2%</td><td class="positive">+28.7%</td><td class="positive">+22.4%</td></tr>
            <tr><td><strong>2023</strong></td><td class="positive">+18.9%</td><td class="positive">+29.8%</td><td class="positive">+14.7%</td></tr>
          </tbody>
        </table>
      `;
    }

    window.onload = () => {
      // Load saved theme
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('theme-btn').innerHTML = savedTheme === 'dark' ? 
        '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';

      renderDashboard();
    };
  </script>
</body>
</html>
