<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPulse • India</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root { --bg: #0a0a0a; --card: #161625; --text: #e0e0e0; --primary: #00d4ff; --accent: #ff00aa; }
    [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --text: #1e2937; --primary: #0066cc; }

    body { font-family: system-ui, sans-serif; margin:0; background: var(--bg); color: var(--text); }
    .container { max-width: 1480px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 2rem; border-radius: 20px; text-align: center; position: relative; }
    .theme-toggle { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: var(--card); border-radius: 20px; padding: 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { margin:0; font-size: 2.8rem; background: linear-gradient(90deg, #00d4ff, #ff00aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
    th { background: #1e2937; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .error { color: #f87171; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></button>
      <h1>MarketPulse India</h1>
      <p id="last-updated">Fetching data from Alpha Vantage...</p>
    </header>

    <div class="grid" id="live-grid"></div>

    <div class="card">
      <h3>📊 Historical Yearly Returns</h3>
      <div id="yearly-returns" style="overflow-x:auto;"></div>
    </div>
  </div>

  <script>
    const API_KEY = "LJVKMQLYR18SFN9Q";

    const assets = [
      { name: "NIFTY 50", symbol: "NIFTY" },
      { name: "GOLDBEES", symbol: "GOLDBEES" }
    ];

    async function fetchWithFallback(symbol) {
      try {
        const url = `https://www.alphavantage.co/query?function=TIME_SERIES_MONTHLY&symbol=${symbol}&apikey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data["Monthly Time Series"]) {
          return data["Monthly Time Series"];
        }
      } catch(e) {}
      return null;
    }

    async function renderYearlyReturns() {
      const container = document.getElementById('yearly-returns');
      let html = `<table><thead><tr><th>Year</th>`;

      assets.forEach(asset => html += `<th>${asset.name}</th>`);
      html += `</tr></thead><tbody>`;

      const allData = {};

      for (let asset of assets) {
        const monthlyData = await fetchWithFallback(asset.symbol);
        if (monthlyData) {
          const yearly = {};
          Object.keys(monthlyData).forEach(date => {
            const year = date.substring(0, 4);
            if (!yearly[year]) yearly[year] = { first: null, last: null };
            const val = parseFloat(monthlyData[date]["4. close"]);
            if (!yearly[year].first) yearly[year].first = val;
            yearly[year].last = val;
          });

          allData[asset.name] = yearly;
        }
      }

      // Get all years
      const years = new Set();
      Object.values(allData).forEach(data => Object.keys(data).forEach(y => years.add(y)));
      const sortedYears = Array.from(years).sort().reverse();

      sortedYears.forEach(year => {
        html += `<tr><td><strong>${year}</strong></td>`;
        assets.forEach(asset => {
          const data = allData[asset.name];
          if (data && data[year]) {
            const ret = ((data[year].last - data[year].first) / data[year].first * 100).toFixed(1);
            const cls = ret > 0 ? 'positive' : 'negative';
            html += `<td class="${cls}">${ret}%</td>`;
          } else {
            html += `<td class="error">—</td>`;
          }
        });
        html += `</tr>`;
      });

      html += `</tbody></table>`;
      container.innerHTML = html || '<p class="error">No historical data available at the moment.</p>';
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-btn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    window.onload = () => {
      renderYearlyReturns();
      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString('en-IN')}`;
    };
  </script>
</body>
</html>
